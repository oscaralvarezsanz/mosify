spring:
  application:
    name: mosify
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:mosify}?${DB_PARAMS:useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DATASOURCE_USER:root}
    password: ${DATASOURCE_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
  h2:
    console:
      enabled: false
      path: /h2-console

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:dHVuZWZhdm9yaXRlam95cGF0aHNtZWxsdHJhaWxzbWlsZXNwcmVhZHN0ZWVsZXNjYXA==}
  expiration-ms: 86400000
