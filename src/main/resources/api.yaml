openapi: 3.1.0
info:
  title: Mosify Reward System API
  version: 1.0.0
servers:
  - url: '/'
paths:
  /boards:
    get:
      summary: Get all boards
      operationId: getAllBoards
      responses:
        '200':
          description: List of boards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BoardResponse'
    post:
      summary: Create a board
      operationId: createBoard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardRequest'
      responses:
        '201':
          description: Board created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardResponse'
  /boards/{id}:
    delete:
      summary: Delete board by ID
      operationId: deleteBoard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Board deleted successfully
        '404':
          description: Board not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /boards/{id}/users:
    get:
      summary: Get users belonging to a board
      operationId: getBoardUsers
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of board users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BoardUserResponse'
  /boards/{id}/users/{userId}:
    post:
      summary: Add an existing user to a board
      operationId: addUserToBoard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: alias
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: User added to board successfully
        '404':
          description: Board or User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Remove a user from a board
      operationId: removeUserFromBoard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: User removed from board successfully
        '404':
          description: Board-User membership not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /boards/{id}/categories:
    get:
      summary: Get categories belonging to a board
      operationId: getBoardCategories
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of board categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'
  /boards/{id}/tasks:
    get:
      summary: Get tasks belonging to a board
      operationId: getBoardTasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of board tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskResponse'
  /boards/{id}/transactions:
    get:
      summary: Get transactions belonging to a board
      operationId: getBoardTransactions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of board transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionResponse'
  /users:
    get:
      summary: Get all users
      operationId: getAllUsers
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
    post:
      summary: Create a user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
  /users/{id}:
    get:
      summary: Get user by ID
      operationId: getUserById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete user by ID
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: User deleted successfully
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{id}/boards:
    get:
      summary: Get boards belonging to a user
      operationId: getUserBoards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of boards the user belongs to
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BoardResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /categories:
    get:
      summary: Get all categories
      operationId: getAllCategories
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'
    post:
      summary: Create a category
      operationId: createCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
  /categories/{id}:
    get:
      summary: Get category by ID
      operationId: getCategoryById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete category by ID
      operationId: deleteCategory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Category deleted successfully
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tasks:
    get:
      summary: Get all tasks
      operationId: getAllTasks
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskResponse'
    post:
      summary: Create a task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
  /tasks/{id}:
    get:
      summary: Get task by ID
      operationId: getTaskById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete task by ID
      operationId: deleteTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Task deleted successfully
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /tasks/{id}/execute:
    post:
      summary: Execute task for a user
      operationId: executeTask
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task executed successfully and transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Business validation error (insufficient balance or already completed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User or Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /transactions:
    get:
      summary: Get transaction logs (audit)
      operationId: getAllTransactions
      responses:
        '200':
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransactionResponse'
  /auth/login:
    post:
      summary: Authenticate user and return JWT token
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid username or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    UserRequest:
      type: object
      required:
        - name
        - username
        - password
      properties:
        name:
          type: string
          example: "Oscar"
        username:
          type: string
          example: "oscar"
        password:
          type: string
          example: "mysecurepassword"
    UserResponse:
      type: object
      required:
        - id
        - name
        - username
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        username:
          type: string
    CategoryRequest:
      type: object
      required:
        - userId
        - boardId
        - name
      properties:
        userId:
          type: string
          format: uuid
        boardId:
          type: string
          format: uuid
        name:
          type: string
          example: "Studies"
        description:
          type: string
          example: "Academic tasks and goals"
    CategoryResponse:
      type: object
      required:
        - id
        - userId
        - boardId
        - name
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        boardId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
    TaskRequest:
      type: object
      required:
        - title
        - categoryId
        - type
        - pointsValue
      properties:
        title:
          type: string
          example: "Study math for 1 hour"
        categoryId:
          type: string
          format: uuid
        type:
          type: string
          enum: [SINGLE_USE, RECURRENT]
          example: "RECURRENT"
        frequency:
          type: string
          enum: [DAILY, WEEKLY, MONTHLY]
          nullable: true
          example: "DAILY"
        pointsValue:
          type: integer
          example: 50
        active:
          type: boolean
          example: true
    TaskResponse:
      type: object
      required:
        - id
        - title
        - categoryId
        - type
        - pointsValue
        - active
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        categoryId:
          type: string
          format: uuid
        type:
          type: string
          enum: [SINGLE_USE, RECURRENT]
        frequency:
          type: string
          enum: [DAILY, WEEKLY, MONTHLY]
          nullable: true
        pointsValue:
          type: integer
        active:
          type: boolean
    TransactionResponse:
      type: object
      required:
        - id
        - userId
        - pointsAffected
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        taskId:
          type: string
          format: uuid
          nullable: true
        pointsAffected:
          type: integer
        createdAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: "INSUFFICIENT_BALANCE"
        message:
          type: string
          example: "The user has insufficient points balance."
    BoardRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Family Board"
    BoardResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    BoardUserResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        pointsBalance:
          type: integer
        alias:
          type: string
        userName:
          type: string
        boardId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: "oscar"
        password:
          type: string
          example: "mysecurepassword"
    AuthResponse:
      type: object
      required:
        - accessToken
        - user
      properties:
        accessToken:
          type: string
          example: "eyJhbGciOiJIUzI1NiJ9..."
        user:
          $ref: '#/components/schemas/UserResponse'